name: AKANO Auto Poster

on:
  schedule:
    - cron: '0 4 * * *'    # 11:00 SA giờ Việt Nam (UTC+7)
    - cron: '0 10 * * *'   # 17:00 CH giờ Việt Nam (UTC+7)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install gspread google-auth google-api-python-client requests pillow

      - name: Generate images (carousel + single post)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID:            ${{ secrets.SHEET_ID }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_TOKEN:       ${{ secrets.FB_PAGE_TOKEN }}
        run: python image_gen.py

      - name: Post to Facebook
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID:            ${{ secrets.SHEET_ID }}
          FB_PAGE_TOKEN:       ${{ secrets.FB_PAGE_TOKEN }}
        run: python poster.py
