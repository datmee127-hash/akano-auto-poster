name: AKANO Auto Poster

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install gspread google-auth google-api-python-client requests pillow numpy openai

      - name: Generate carousel images
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID:            ${{ secrets.SHEET_ID }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_TOKEN:       ${{ secrets.FB_PAGE_TOKEN }}
        run: python image_gen_carousel.py

      - name: Generate banner/infographic images
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID:            ${{ secrets.SHEET_ID }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_TOKEN:       ${{ secrets.FB_PAGE_TOKEN }}
        run: python image_gen.py

      - name: Generate single post images
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID:            ${{ secrets.SHEET_ID }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_TOKEN:       ${{ secrets.FB_PAGE_TOKEN }}
        run: python image_gen_single.py

      - name: Patch poster before posting
        run: |
          python - <<'PYEOF'
          import re
          content = open('poster.py', encoding='utf-8').read()
          patch = ' fmt = str(row.get("FORMAT", "")).strip().lower()\n if fmt in ("carousel","single","single-post","singer-post","banner","infographic"):\n  v1 = str(row.get("IMAGE_PATH_1","") or row.get("IMAGE_PATH","")).strip()\n  if not v1:\n   print("[SKIP] row " + str(row_num) + ": " + fmt + " chua co anh")\n   continue\n'
          new = content.replace(' row_num = i + 4\n caption =', ' row_num = i + 4\n' + patch + ' caption =', 1)
          open('poster.py', 'w', encoding='utf-8').write(new)
          print("patched" if new != content else "pattern not found")
          PYEOF

      - name: Post to Facebook
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID:            ${{ secrets.SHEET_ID }}
          FB_PAGE_TOKEN:       ${{ secrets.FB_PAGE_TOKEN }}
        run: python poster.py
